version: 1

services:
  - type: web
    name: erp-gateway
    runtime: docker
    dockerfilePath: gateway/Dockerfile
    rootDirectory: cloud-erp-platform
    plan: free
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /

  - type: web
    name: erp-dashboard
    runtime: static
    rootDirectory: cloud-erp-platform
    staticPublishPath: ./dashboard
    buildCommand: echo "Static Dashboard - No build needed"
    plan: free
